name: Wiki

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wiki:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags

      - name: Generate wiki content
        run: |
          mkdir -p wiki

          # Home page
          cat > wiki/Home.md << 'EOF'
          # terraform-azurerm-vault

          Terraform module for creating Azure Key Vault resources.

          ## Quick Links

          - [Module Versions](Module-Versions)
          - [Usage Examples](Usage-Examples)
          EOF

          # Module versions page
          cat > wiki/Module-Versions.md << 'HEADER'
          # Module Versions

          This page explains how to pin the module to a specific version.

          ## Using a Specific Version (Recommended)

          Always pin to a specific version in production:

          ```hcl
          module "vault" {
            source = "github.com/${{ github.repository }}?ref=v1.0.0"

            name                = "my-keyvault"
            resource_group_name = "my-rg"
            location            = "eastus"
            tenant_id           = data.azurerm_client_config.current.tenant_id
          }
          ```

          ## Using Latest (Not Recommended for Production)

          ```hcl
          module "vault" {
            source = "github.com/${{ github.repository }}"
            # ...
          }
          ```

          ## Available Versions

          | Version | Release Date | Notes |
          |---------|--------------|-------|
          HEADER

          # Add each tag to the versions table
          git tag -l 'v*' --sort=-v:refname | while read tag; do
            date=$(git log -1 --format=%cs "$tag" 2>/dev/null || echo "N/A")
            echo "| \`$tag\` | $date | [Release notes](https://github.com/${{ github.repository }}/releases/tag/$tag) |" >> wiki/Module-Versions.md
          done

          # If no tags yet
          if [ ! -s wiki/Module-Versions.md ] || ! grep -q "^| \`v" wiki/Module-Versions.md; then
            echo "| *No releases yet* | - | - |" >> wiki/Module-Versions.md
          fi

          # Usage examples page
          cat > wiki/Usage-Examples.md << 'EOF'
          # Usage Examples

          ## Basic Usage

          ```hcl
          data "azurerm_client_config" "current" {}

          module "vault" {
            source = "github.com/${{ github.repository }}?ref=v1.0.0"

            name                = "kv-myapp-prod"
            resource_group_name = azurerm_resource_group.main.name
            location            = azurerm_resource_group.main.location
            tenant_id           = data.azurerm_client_config.current.tenant_id

            tags = {
              Environment = "production"
            }
          }
          ```

          ## With Network Restrictions

          ```hcl
          module "vault" {
            source = "github.com/${{ github.repository }}?ref=v1.0.0"

            name                          = "kv-myapp-prod"
            resource_group_name           = azurerm_resource_group.main.name
            location                      = azurerm_resource_group.main.location
            tenant_id                     = data.azurerm_client_config.current.tenant_id
            public_network_access_enabled = false

            network_acls = {
              default_action             = "Deny"
              bypass                     = "AzureServices"
              ip_rules                   = ["203.0.113.0/24"]
              virtual_network_subnet_ids = [azurerm_subnet.main.id]
            }
          }
          ```

          ## With Premium SKU

          ```hcl
          module "vault" {
            source = "github.com/${{ github.repository }}?ref=v1.0.0"

            name                = "kv-myapp-prod"
            resource_group_name = azurerm_resource_group.main.name
            location            = azurerm_resource_group.main.location
            tenant_id           = data.azurerm_client_config.current.tenant_id
            sku_name            = "premium"

            purge_protection_enabled   = true
            soft_delete_retention_days = 90
          }
          ```
          EOF

      - name: Push to wiki
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo || {
            echo "Wiki not initialized. Please create a page manually first."
            exit 0
          }

          cp wiki/*.md wiki-repo/
          cd wiki-repo

          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "Update wiki for ${{ github.event.release.tag_name || 'manual run' }}"
            git push
          fi
