name: Wiki

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag name'
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wiki:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Generate wiki content
        env:
          TAG_NAME: ${{ inputs.tag_name || 'latest' }}
        run: |
          mkdir -p wiki

          # Get module info as JSON
          terraform-docs json . > module.json

          # Extract names
          MODULE_NAME="${GITHUB_REPOSITORY##*/}"
          SHORT_NAME="${MODULE_NAME#terraform-azurerm-}"

          # Get description from README (line 3)
          DESCRIPTION=$(sed -n '3p' README.md)

          # Generate required vars for examples
          REQUIRED_VARS=$(jq -r '.inputs[] | select(.required == true) | "  \(.name) = \"<\(.name)>\""' module.json)

          # Home.md
          cat > wiki/Home.md << EOF
          # ${MODULE_NAME}

          ${DESCRIPTION}

          ## Documentation

          - [Inputs](Inputs) - Input variables
          - [Outputs](Outputs) - Output values
          - [Module Versions](Module-Versions) - Version pinning
          - [Usage Examples](Usage-Examples) - Common patterns
          EOF

          # Inputs.md
          {
            echo "# Inputs"
            echo ""
            terraform-docs markdown table --show inputs .
          } > wiki/Inputs.md

          # Outputs.md
          {
            echo "# Outputs"
            echo ""
            terraform-docs markdown table --show outputs .
          } > wiki/Outputs.md

          # Module-Versions.md
          cat > wiki/Module-Versions.md << EOF
          # Module Versions

          ## Using a Specific Version (Recommended)

          \`\`\`hcl
          module "${SHORT_NAME}" {
            source = "github.com/${GITHUB_REPOSITORY}?ref=${TAG_NAME}"

          ${REQUIRED_VARS}
          }
          \`\`\`

          ## Available Versions

          | Version | Release Date | Notes |
          |---------|--------------|-------|
          EOF

          git tag -l 'v*' --sort=-v:refname | while read tag; do
            date=$(git log -1 --format=%cs "$tag" 2>/dev/null || echo "N/A")
            echo "| \`$tag\` | $date | [Release notes](https://github.com/${GITHUB_REPOSITORY}/releases/tag/$tag) |" >> wiki/Module-Versions.md
          done

          # If no tags yet
          if ! grep -q "^| \`v" wiki/Module-Versions.md; then
            echo "| *No releases yet* | - | - |" >> wiki/Module-Versions.md
          fi

          # Usage-Examples.md - generate dynamically based on actual variables
          # Get network_acls type info
          HAS_NETWORK_ACLS=$(jq -r '.inputs[] | select(.name == "network_acls") | .name' module.json)

          cat > wiki/Usage-Examples.md << EOF
          # Usage Examples

          ## Basic Usage

          \`\`\`hcl
          data "azurerm_client_config" "current" {}

          module "${SHORT_NAME}" {
            source = "github.com/${GITHUB_REPOSITORY}?ref=${TAG_NAME}"

          ${REQUIRED_VARS}

            tags = {
              Environment = "production"
            }
          }
          \`\`\`
          EOF

          # Add network ACLs example if the variable exists
          if [ -n "$HAS_NETWORK_ACLS" ]; then
            cat >> wiki/Usage-Examples.md << EOF

          ## With Network Restrictions

          \`\`\`hcl
          module "${SHORT_NAME}" {
            source = "github.com/${GITHUB_REPOSITORY}?ref=${TAG_NAME}"

          ${REQUIRED_VARS}
            public_network_access_enabled = false

            network_acls = {
              default_action             = "Deny"
              bypass                     = "AzureServices"
              ip_rules                   = ["203.0.113.0/24"]
              virtual_network_subnet_ids = [azurerm_subnet.main.id]
            }
          }
          \`\`\`
          EOF
          fi

          # Add premium SKU example if sku_name variable exists
          HAS_SKU=$(jq -r '.inputs[] | select(.name == "sku_name") | .name' module.json)
          if [ -n "$HAS_SKU" ]; then
            cat >> wiki/Usage-Examples.md << EOF

          ## With Premium SKU

          \`\`\`hcl
          module "${SHORT_NAME}" {
            source = "github.com/${GITHUB_REPOSITORY}?ref=${TAG_NAME}"

          ${REQUIRED_VARS}
            sku_name = "premium"

            purge_protection_enabled   = true
            soft_delete_retention_days = 90
          }
          \`\`\`
          EOF
          fi

      - name: Push to wiki
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-repo || {
            echo "Wiki not initialized. Please create a page manually first."
            exit 0
          }

          cp wiki/*.md wiki-repo/
          cd wiki-repo

          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "Update wiki for ${TAG_NAME:-manual run}"
            git push
          fi
